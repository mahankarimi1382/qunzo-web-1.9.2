name: Extract main.zip to Root

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # دیگر نیازی به تعریف permissions جداگانه نیست چون از PAT استفاده می‌کنیم

    steps:
      - name: Checkout code with PAT
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}   # ← استفاده از توکن شخصی

      - name: Download main.zip from Release
        run: |
          curl -L -o main.zip "https://github.com/mahankarimi1382/qunzo-web-1.9.2/releases/download/orginal/main.zip"

      - name: Extract and Move to Root
        run: |
          if [ ! -f "main.zip" ]; then
            echo "❌ فایل main.zip دانلود نشد!"
            exit 1
          fi
          
          echo "📦 در حال اکسترکت..."
          unzip -o main.zip
          
          if [ -d "main" ]; then
            echo "📂 انتقال از پوشه main به ریشه..."
            mv main/* . 2>/dev/null || true
            mv main/.* . 2>/dev/null || true
            rm -rf main
          fi
          
          rm main.zip
          echo "✅ اکسترکت کامل شد"

      - name: Commit and Push (Force add ignored files like vendor)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Extract full source including vendor [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          push_options: '--force-with-lease'
          add_options: '-f'
          # استفاده از توکن شخصی برای commit و push
          github_token: ${{ secrets.PAT_TOKEN }}
