name: Extract main.zip to Root

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with remote (rebase)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || echo "No remote changes to rebase"

      - name: Extract and Move to Root
        run: |
          if [ ! -f "main.zip" ]; then
            echo "❌ فایل main.zip وجود ندارد!"
            exit 1
          fi
          
          echo "📦 در حال اکسترکت..."
          unzip -o main.zip
          
          # اگر پوشه main وجود دارد، محتویاتش را به ریشه منتقل کن
          if [ -d "main" ]; then
            echo "📂 انتقال از پوشه main به ریشه..."
            mv main/* . 2>/dev/null || true
            mv main/.* . 2>/dev/null || true
            rm -rf main
          fi
          
          rm main.zip
          echo "✅ اکسترکت و انتقال کامل شد"

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Extract main.zip to root [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_options: '--amend'  # اختیاری: اگر می‌خواهید commit قبلی را اصلاح کنید
          push_options: '--force-with-lease'
