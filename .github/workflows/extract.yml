name: Extract main.zip to Root

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code with PAT
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Download main.zip from Release
        run: |
          curl -L -o main.zip "https://github.com/mahankarimi1382/qunzo-web-1.9.2/releases/download/orginal/main.zip"

      - name: Extract and Move to Root
        run: |
          if [ ! -f "main.zip" ]; then
            echo "❌ فایل main.zip دانلود نشد!"
            exit 1
          fi
          
          echo "📦 در حال اکسترکت..."
          unzip -o main.zip
          
          if [ -d "main" ]; then
            echo "📂 انتقال از پوشه main به ریشه..."
            mv main/* . 2>/dev/null || true
            mv main/.* . 2>/dev/null || true
            rm -rf main
          fi
          
          rm main.zip
          echo "✅ اکسترکت کامل شد"

      - name: Force add all files (including vendor) and push
        run: |
          # تنظیم هویت برای commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # اضافه کردن همه فایل‌ها (حتی نادیده‌گرفته‌شده‌ها) به Stage
          git add -f .
          
          # اگر تغییری وجود داشت، commit کن، در غیر این صورت پیام بده
          if git diff --staged --quiet; then
            echo "⚠️ هیچ تغییر جدیدی برای commit وجود ندارد."
          else
            git commit -m "Extract full source including vendor [skip ci]"
            # Push با force-lease برای جلوگیری از خطای واگرایی
            git push --force-with-lease origin main
            echo "✅ Commit و Push با موفقیت انجام شد."
          fi
